<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mandala Cybernetics || Dominating Kathmandu's Market in Digital Transformation.</title>
  
  <!-- Move these styles to your style.css -->
  <style>
    /* 
      Neo-Minimalist & High-Tech Theme 
      Tailored for Mandala Cybernetics
    */
    :root {
      --bg-dark: #07070a;
      --card-bg: rgba(20, 20, 25, 0.7);
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --accent-glow: #00e5ff; /* Cyber Cyan */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      /* Subtle tech-inspired background glow */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(0, 229, 255, 0.04), transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(5, 99, 187, 0.08), transparent 50%);
    }

    .demo-container {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.4s ease, border-color 0.4s ease;
    }

    .demo-container:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 229, 255, 0.2);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn-primary {
      display: inline-block;
      background: transparent;
      color: var(--accent-glow);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 12px 32px;
      border-radius: 50px;
      border: 1px solid var(--accent-glow);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      background: var(--accent-glow);
      color: var(--bg-dark);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>Know about our Story and Products</h1>
    <!-- Fixed minor grammar: "feedback are" to "feedback is" -->
    <p>Launched, your feedback is welcomed!</p> 
    <a href="https://mandalacybernetics.com/" class="btn-primary">Mandala Cybernetics</a>
  </div>
</body>
</html>
